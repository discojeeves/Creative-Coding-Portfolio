  <p>Describe what's happening in this shader.</p>

  <!-- =============================================
       SHADER BLOCK — copy to add more.
       Edit the fragment GLSL inside the <script> tag.

       Available in every fragment shader:
         varying vec2 vUv;          (0..1 across the plane)
         uniform float u_time;
         uniform vec2  u_resolution;

       To add more uniforms: define them in the uniforms
       object inside initBlock() and reference them here.
       ============================================= -->
  <div class="shader-block">
    <canvas class="shader-canvas"></canvas>
    <div class="shader-editor"></div>
    <div class="shader-error"></div>
    <script type="x-shader/x-fragment">
precision mediump float;

varying vec2 vUv;
uniform float u_time;
uniform vec2  u_resolution;

void main() {
    vec3 col = 0.5 + 0.5 * cos(u_time + vUv.xyx + vec3(0.0, 2.0, 4.0));
    gl_FragColor = vec4(col, 1.0);
}
    </script>

  <div class="shader-block">
    <canvas class="shader-canvas"></canvas>
    <div class="shader-editor"></div>
    <div class="shader-error"></div>
    <script type="x-shader/x-fragment">
precision mediump float;

varying vec2 vUv;
uniform float u_time;
uniform vec2  u_resolution;

void main() {
    vec2 uv = vUv * 2.0 - 1.0;
    uv.x *= u_resolution.x / u_resolution.y;

    float r = length(uv);
    float a = atan(uv.y, uv.x);

    float f = 0.5 + 0.5 * sin(a * 6.0 + u_time * 2.0);
    float shape = smoothstep(f, f - 0.02, r);

    vec3 col = mix(vec3(0.05), vec3(0.4, 0.2, 1.0), shape);
    gl_FragColor = vec4(col, 1.0);
}
    </script>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.174.0/build/three.module.js"
  }
}
</script>

<script type="module">
// ─── Three.js + CodeMirror setup ─────────────────────────────────────────────
//
// This template uses Three.js to handle WebGL boilerplate.
// Three.js manages shader compilation, GPU buffers, and the render loop for you.
// In your fragment shaders, use the `vUv` varying for UV coordinates (0..1).

import * as three from 'three';
import { OrbitControls } from '/node_modules/three/examples/jsm/controls/OrbitControls.js';

// ── Vertex shader ──
// Runs once per vertex. Its only job here is to forward the built-in `uv`
// attribute (provided by Three.js PlaneGeometry) into `vUv`, which the
// fragment shader then reads as a varying.
// projectionMatrix / modelViewMatrix are auto-injected by Three.js.
const VERT_SRC = `
  varying vec2 vUv;
  void main() {
    vUv = uv;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;

function initBlock(blockEl) {
  const canvas   = blockEl.querySelector('.shader-canvas');
  const editorEl = blockEl.querySelector('.shader-editor');
  const errorEl  = blockEl.querySelector('.shader-error');
  const srcEl    = blockEl.querySelector('script[type="x-shader/x-fragment"]');
  // Read the GLSL from the <script type="x-shader/x-fragment"> tag in the HTML
  const initialSrc = srcEl ? srcEl.textContent.trim() : 'void main(){ gl_FragColor = vec4(1.0); }';

  // ── Three.js setup ──
  const renderer = new three.WebGLRenderer({ canvas, antialias: true });
  const scene    = new three.Scene();

  // OrthographicCamera: no perspective distortion — the plane fills the view exactly.
  // Arguments are (left, right, top, bottom, near, far) in world units.
  // Since the plane is 1x1, these bounds of -0.5..0.5 make it pixel-fill the canvas.
  const camera = new three.OrthographicCamera(-0.5, 0.5, 0.5, -0.5, 0, 1);


  // Uniforms are how you pass data from JavaScript into your GLSL shaders.
  // Each entry is { value: ... } — Three.js reads the .value property each frame.
  const uniforms = {
    u_time:       { value: 0 },
    u_resolution: { value: new three.Vector2() },
  };


  // ShaderMaterial: a Three.js material that uses your custom GLSL shaders.
  // vertexShader runs per-vertex, fragmentShader runs per-pixel.
  const material = new three.ShaderMaterial({
    vertexShader:   VERT_SRC,
    fragmentShader: initialSrc,
    uniforms,
  });


  // A flat 1x1 plane — combined with the OrthographicCamera above, this
  // acts as a fullscreen canvas for the fragment shader.
  const mesh = new three.Mesh(new three.PlaneGeometry(1, 1), material);
  scene.add(mesh);

  
  // Called by Three.js when a shader fails to compile (Three.js r150+).
  // `fs` is the raw WebGL fragment shader object — we pull the error log from it.
  renderer.debug.onShaderError = (_gl, _program, _vs, fs) => {
    const gl  = renderer.getContext();
    const log = gl.getShaderInfoLog(fs) || 'Unknown shader error';
    errorEl.textContent = log;
    errorEl.classList.add('visible');
  };

  // Syncs the renderer and u_resolution to the canvas's actual CSS display size
  function resize() {
    const w = canvas.clientWidth;
    const h = canvas.clientHeight;
    if (canvas.width !== w || canvas.height !== h) {
      renderer.setSize(w, h, false); // false = don't override CSS size
      uniforms.u_resolution.value.set(w, h);
    }
  }

  const startTime = performance.now();

  // The animation loop — runs every frame via requestAnimationFrame
  function render() {
    requestAnimationFrame(render);
    resize();
    uniforms.u_time.value = (performance.now() - startTime) / 1000; // seconds since load
    renderer.render(scene, camera);
  }
  render();

  // ── Recompile on edit ──
  // Unlike raw WebGL, Three.js recompiles automatically on the next render()
  // call when needsUpdate is true — no manual compile/link steps needed.
  function applyShader(src) {
    errorEl.textContent = '';
    errorEl.classList.remove('visible');
    material.fragmentShader = src;
    material.needsUpdate = true; // signals Three.js to recompile before next render
  }

  // ── CodeMirror setup ──
  // Creates the syntax-highlighted editor inside the .shader-editor div
  const editor = CodeMirror(editorEl, {
    value: initialSrc,
    mode: 'text/x-glsl', // GLSL syntax highlighting (via the clike mode)
    theme: 'dracula',
    lineNumbers: true,
    tabSize: 4,
    indentWithTabs: false,
    autofocus: false,
  });

  // Recompile 600ms after the user stops typing (debounce avoids recompiling on every keystroke)
  let debounce;
  editor.on('change', () => {
    clearTimeout(debounce);
    debounce = setTimeout(() => applyShader(editor.getValue()), 600);
  });
}

// Run initBlock() on every .shader-block div found on the page
document.querySelectorAll('.shader-block').forEach(initBlock);
</script>
</body>
